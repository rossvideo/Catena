name: "01 Toolchain Delta"

on:
  workflow_call:
    inputs:
      run_mode:
        required: true
        type: string
    outputs:
      toolchain_changed:
        description: Whether any toolchain files changed.
        value: ${{ jobs.detect.outputs.toolchain_changed }}
      cpp_changed:
        description: Whether C++ toolchain files changed.
        value: ${{ jobs.detect.outputs.cpp_changed }}
      go_changed:
        description: Whether Go toolchain files changed.
        value: ${{ jobs.detect.outputs.go_changed }}

jobs:
  detect:
    name: Detect toolchain changes
    runs-on: ubuntu-latest
    outputs:
      toolchain_changed: ${{ steps.detect.outputs.toolchain_changed }}
      cpp_changed: ${{ steps.detect.outputs.cpp_changed }}
      go_changed: ${{ steps.detect.outputs.go_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Compute changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.run_mode }}" == "force" ]]; then
            echo "Manual force enabled: rebuilding both toolchains and skipping stages 2-5"
            echo "cpp_changed=true" >> "$GITHUB_OUTPUT"
            echo "go_changed=true" >> "$GITHUB_OUTPUT"
            echo "toolchain_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ inputs.run_mode }}" == "manual" ]]; then
            BASE_REF="origin/develop"
            git fetch origin develop --depth=1
            DIFF_FILES="$(git diff --name-only "$BASE_REF"...HEAD || true)"
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            DIFF_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
          fi

          echo "Changed files:"
          echo "$DIFF_FILES"

          CPP_CHANGED=false
          GO_CHANGED=false

          if echo "$DIFF_FILES" | grep -Eq '^\.devcontainer/cpp/(toolchain\.dockerfile|toolchain\.env)$'; then
            CPP_CHANGED=true
          fi
          if echo "$DIFF_FILES" | grep -Eq '^\.devcontainer/go/(toolchain\.dockerfile|toolchain\.env|go\.mod|go\.sum)$'; then
            GO_CHANGED=true
          fi

          TOOLCHAIN_CHANGED=false
          if [[ "$CPP_CHANGED" == "true" || "$GO_CHANGED" == "true" ]]; then
            TOOLCHAIN_CHANGED=true
          fi

          echo "cpp_changed=$CPP_CHANGED" >> "$GITHUB_OUTPUT"
          echo "go_changed=$GO_CHANGED" >> "$GITHUB_OUTPUT"
          echo "toolchain_changed=$TOOLCHAIN_CHANGED" >> "$GITHUB_OUTPUT"

  build_cpp_toolchain:
    name: Build C++ toolchain
    needs: detect
    if: needs.detect.outputs.cpp_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (manual mode only)
        if: inputs.run_mode == 'manual'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build C++ toolchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/cpp/toolchain.dockerfile
          push: ${{ inputs.run_mode == 'manual' }}
          tags: ghcr.io/rossvideo/catena-cpp-toolchain:latest

  build_go_toolchain:
    name: Build Go toolchain
    needs: detect
    if: needs.detect.outputs.go_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (manual mode only)
        if: inputs.run_mode == 'manual'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Go toolchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/go/toolchain.dockerfile
          push: ${{ inputs.run_mode == 'manual' }}
          tags: ghcr.io/rossvideo/catena-go-toolchain:latest
