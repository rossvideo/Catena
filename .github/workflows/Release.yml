          SRC="ghcr.io/rossvideo/catena-cpp-toolchain:develop"

          docker buildx imagetools create \
            --tag "ghcr.io/rossvideo/catena-cpp-toolchain:latest" \
            --tag "ghcr.io/rossvideo/catena-cpp-toolchain:$NEW_VERSION" \
            "$SRC"

          echo "✅ cpp toolchain retagged → latest and $NEW_VERSION"

