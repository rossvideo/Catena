        run: |
          echo "⚠️  One or more container retag operations failed:"
          echo "     cpp retag : ${{ steps.retag_cpp.outcome }}"
          echo "     go  retag : ${{ steps.retag_go.outcome }}"
          echo ""
          echo "The GitHub release was created successfully."
          echo "Please retag the following images manually:"
          echo "  ghcr.io/rossvideo/catena-cpp-toolchain:develop  →  latest / $NEW_VERSION"
          echo "  ghcr.io/rossvideo/catena-go-toolchain:develop   →  latest / $NEW_VERSION"
