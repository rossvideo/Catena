name: JavaScript Code Analysis
# this runs the workflow on PR and make sure that the code is tested and analyzed

on:
  push:
    branches: ["develop"]
    paths:
      - "tools/codegen/**"
  pull_request:
    paths:
      - "tools/codegen/**"
      - ".github/workflows/js-pull-request.yml"
  workflow_dispatch:

jobs:
  Unit-Tests:
    name: Run Unit Tests and coverage
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Setup SMPTE
        run: |
          cd ${GITHUB_WORKSPACE}/smpte
          ./install-tooling.sh
          npm install
          ./build-openapi.sh

      - name: Run Codegen Unit Tests and Coverage Report
        run: |
          cd ${GITHUB_WORKSPACE}/tools/codegen
          npm install
          npm test -- --ci

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          report_individual_runs: "true"
          check_name: Codegen Unit Tests
          files: |
            tools/codegen/junit.xml
          github_token: ${{ secrets.GITHUB_TOKEN }}

