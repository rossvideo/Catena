name: "build on arm64 tester"
on:
  push:
    branches:
      - arm-build
env:
  REGISTRY: ghcr.io 

jobs: 
  build-and-push-toolchain:
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-latest
          toolchain: cpp
        - platform: linux/amd64
          runner: ubuntu-latest
          toolchain: go
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
          toolchain: cpp
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE_NAME: catena-${{ matrix.toolchain }}-toolchain
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      #
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=${{ env.REGISTRY }}/rossvideo/${{ env.IMAGE_NAME }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          labels: |
            org.opencontainers.image.version=latest

      - name: Print stuff
        run: |
          echo "IMAGE_NAME: ${{ env.IMAGE_NAME }}"
          echo "REGISTRY: ${{ env.REGISTRY }}"
          echo "tags: ${{ env.REGISTRY_IMAGE }}:latest"
          echo "labels: ${{ steps.meta.outputs.labels }}"

      - name: Paths Changes Filter
        id: changes
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            toolchain:
              - '.devcontainer/${{ matrix.toolchain }}/toolchain.dockerfile'
              - '.devcontainer/${{ matrix.toolchain }}/toolchain.env'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        id: push
        # if: steps.changes.outputs.toolchain == 'true'
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          context: .
          file: .devcontainer/${{ matrix.toolchain }}/toolchain.dockerfile
          tags: "${{ env.REGISTRY_IMAGE }}"
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      
      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.toolchain }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-digests:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
        - toolchain: go
        - toolchain: cpp
    env:
      IMAGE_NAME: catena-${{ matrix.toolchain }}-toolchain
    steps:
      - name: Prepare
        run: |
          echo "REGISTRY_IMAGE=${{ env.REGISTRY }}/rossvideo/${{ env.IMAGE_NAME }}" >> $GITHUB_ENV
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.toolchain }}-*
          merge-multiple: true
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          labels: |
            org.opencontainers.image.version=latest
          tags: |
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
