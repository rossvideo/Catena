name: "04 Build and Unit Tests"

"on":
  workflow_call:
    inputs:
      cpp_image:
        required: false
        type: string
        default: ghcr.io/rossvideo/catena-cpp-toolchain:develop
      go_image:
        required: false
        type: string
        default: ghcr.io/rossvideo/catena-go-toolchain:develop
      force_cpp_tests:
        required: false
        type: boolean
        default: false
      force_go_tests:
        required: false
        type: boolean
        default: false

jobs:
  detect_changes:
    name: Detect language changes
    runs-on: ubuntu-latest
    outputs:
      cpp_changed: ${{ steps.filter.outputs.cpp }}
      go_changed: ${{ steps.filter.outputs.go }}
      js_changed: ${{ steps.filter.outputs.js }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            cpp:
              - 'sdks/cpp/**'
              - 'unittests/cpp/**'
            go:
              - 'sdks/go/**'
              - 'smpte'
            js:
              - 'tools/codegen/**'

  test_cpp:
    name: C++ Build and Tests
    needs: detect_changes
    if: needs.detect_changes.outputs.cpp_changed == 'true' || inputs.force_cpp_tests
    timeout-minutes: 25
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ${{ inputs.cpp_image }}
      options: --user root:root
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build and test C++
        id: run_cpp_tests
        shell: bash
        run: |
          set -euo pipefail
          export BUILD_TARGET="${GITHUB_WORKSPACE}/build/cpp"
          export CMAKE_BUILD_TYPE=Debug
          export CONNECTIONS='gRPC;REST'

          cd "${GITHUB_WORKSPACE}/smpte"
          ./build-openapi.sh

          mkdir -p "${BUILD_TARGET}"
          cmake -G Ninja \
            -DBUILD_DOC=OFF \
            -DBARE_EXAMPLES=ON \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DCONNECTIONS="${CONNECTIONS}" \
            -DCOVERAGE=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local/.local \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=TRUE \
            -DLOG_DIR="${HOME}/Catena/logs" \
            -B "${BUILD_TARGET}" \
            -S "${GITHUB_WORKSPACE}/sdks/cpp"

          ninja -C "${BUILD_TARGET}"

          run_cpp_ctest() {
            ctest --output-on-failure --output-junit "${BUILD_TARGET}/ctest.xml" --test-dir "${BUILD_TARGET}" -R '^(common|gRPC|REST)\.'
          }
          if ! run_cpp_ctest; then
            echo "C++ tests failed on first attempt; retrying once..."
            run_cpp_ctest
          fi

      - name: Generate C++ coverage report
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          export BUILD_TARGET="${GITHUB_WORKSPACE}/build/cpp"
          gcovr \
            --cobertura "${BUILD_TARGET}/coverage.xml" \
            --lcov "${BUILD_TARGET}/coverage.info" || true

      - name: Summarize C++ tests
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          export BUILD_TARGET="${GITHUB_WORKSPACE}/build/cpp"
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          output_path = os.path.join(os.environ['GITHUB_WORKSPACE'], 'cpp-test-summary.md')
          xml_path = os.path.join(os.environ['BUILD_TARGET'], 'ctest.xml')
          coverage_xml_path = os.path.join(os.environ['BUILD_TARGET'], 'coverage.xml')
          outcome = '${{ steps.run_cpp_tests.outcome }}'

          tests = failures = errors = skipped = 0
          coverage = 'n/a'
          failed_tests = []
          if os.path.exists(xml_path):
              root = ET.parse(xml_path).getroot()
              tests = int(root.attrib.get('tests', 0))
              failures = int(root.attrib.get('failures', 0))
              errors = int(root.attrib.get('errors', 0))
              skipped = int(root.attrib.get('skipped', 0))

              for testcase in root.findall('.//testcase'):
                has_failure = testcase.find('failure') is not None
                has_error = testcase.find('error') is not None
                if has_failure or has_error:
                  classname = testcase.attrib.get('classname', '').strip()
                  name = testcase.attrib.get('name', '').strip()
                  label = f"{classname}.{name}" if classname else name
                  if label:
                    failed_tests.append(label)

              # Keep insertion order while removing duplicates.
              failed_tests = list(dict.fromkeys(failed_tests))

          if os.path.exists(coverage_xml_path):
              root = ET.parse(coverage_xml_path).getroot()
              line_rate = root.attrib.get('line-rate')
              if line_rate is not None:
                  try:
                      coverage = f"{float(line_rate) * 100:.2f}%"
                  except ValueError:
                      coverage = 'n/a'

          with open(output_path, 'w', encoding='utf-8') as handle:
              handle.write('### C++ Build and Tests\n')
              handle.write(f'- Result: {outcome}\n')
              handle.write(f'- Tests: {tests}\n')
              handle.write(f'- Failures: {failures}\n')
              handle.write(f'- Errors: {errors}\n')
              handle.write(f'- Skipped: {skipped}\n')
              handle.write(f'- Coverage: {coverage}\n')
              if failed_tests:
                limit = 20
                handle.write('- Failed tests:\n')
                for test_name in failed_tests[:limit]:
                  handle.write(f'  - {test_name}\n')
                if len(failed_tests) > limit:
                  handle.write(f'  - ... and {len(failed_tests) - limit} more\n')
          PY

      - name: Upload C++ test summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-summary-cpp
          path: cpp-test-summary.md
          if-no-files-found: error

  test_go:
    name: Go Build and Tests
    needs: detect_changes
    if: needs.detect_changes.outputs.go_changed == 'true' || inputs.force_go_tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      code-quality: write
    container:
      image: ${{ inputs.go_image }}
      options: --user root:root

    env:
      BUILD_TARGET: ${{ github.workspace }}/build/go
      COVERAGE_DIR: ${{ github.workspace }}/sdks/go
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build and test Go
        id: run_go_tests
        shell: bash
        run: |
          set -euo pipefail

          echo "Building OpenAPI"
          cd "${GITHUB_WORKSPACE}/smpte"
          ./build-openapi.sh
          echo "Done building OpenAPI"

          mkdir -p "${BUILD_TARGET}"
          cd "${GITHUB_WORKSPACE}/sdks/go"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          "${GITHUB_WORKSPACE}/.devcontainer/go/postCreateCommand.sh" root "${BUILD_TARGET}" "${GITHUB_WORKSPACE}"

          set -o pipefail
          GOTESTSUM_OPTS="--junitfile ${BUILD_TARGET}/go-tests.xml"
          run_go_tests() {
            cd "${GITHUB_WORKSPACE}/sdks/go"
            make VERBOSE=1 COVERAGE_DIR=${COVERAGE_DIR} GOTESTSUM_OPTS="${GOTESTSUM_OPTS}" coverage coverage-html coverage-cobertura 2>&1 | tee "${BUILD_TARGET}/go-test.log"
          }
          if ! run_go_tests; then
            echo "Go tests failed on first attempt; retrying once..."
            run_go_tests
          fi

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          files: ${{ github.workspace }}/build/go/go-tests.xml
          check-name: Go Unit Tests

      - uses: actions/upload-code-coverage@v1
        with:
          file: ${{ env.COVERAGE_DIR }}/go_coverage.xml
          language: Go
          label: code-coverage/go

      - name: Upload Go test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-artifacts-go
          path: |
            ${{ env.BUILD_TARGET }}/go-tests.xml
            ${{ env.COVERAGE_DIR }}/go_coverage.xml
            go-test-summary.md
          if-no-files-found: error

  test_js:
    name: Codegen JS Tests
    needs: detect_changes
    if: needs.detect_changes.outputs.js_changed == 'true'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      code-quality: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24.17.0"
          cache: "npm"
          cache-dependency-path: tools/package-lock.json

      - name: Build SMPTE artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/smpte"
          ./install-tooling.sh
          ./build-openapi.sh
      
      - name: Run codegen tests
        id: run_js_tests
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/tools/codegen"
          npm ci
          run_js_tests() {
            npm test -- --ci
          }
          if ! run_js_tests; then
            echo "JS tests failed on first attempt; retrying once..."
            run_js_tests
          fi

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          files: ${{ github.workspace }}/tools/codegen/junit.xml
          check-name: Codegen JS Unit Tests

      - uses: actions/upload-code-coverage@v1
        with:
          file: ${{ github.workspace }}/tools/codegen/coverage/cobertura-coverage.xml
          language: JavaScript
          label: code-coverage/js

      - name: Upload JS test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-artifacts-js
          path: |
            ${{ github.workspace }}/tools/codegen/junit.xml
            ${{ github.workspace }}/tools/codegen/coverage/cobertura-coverage.xml
          if-no-files-found: error
