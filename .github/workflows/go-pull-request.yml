name: Go Code Analysis
# this runs the workflow on PR and make sure that the code is tested and analyzed

on:
  push:
    branches: ["develop"]
    paths:
      - 'sdks/go/**'
      #- 'unittests/go/**'
      #- 'tools/codegen/**'
  pull_request:
    paths:
      - 'sdks/go/**'
      #- 'unittests/go/**'
      #- 'tools/codegen/**'
      - '.github/workflows/go-pull-request.yml'
  workflow_dispatch:

jobs:
  Trivy:
    name: Trivy vulnerability scanner (25 seconds)
    timeout-minutes: 2
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          skip-dirs: '.git,build,coverage,docs,sdks/java,sdks/cpp,unittests'
          skip-files: 'pom.xml'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: 'Trivy Scan Results'

  CodeQL:
    name: CodeQL Analysis (5-10 minutes)
    timeout-minutes: 35
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rossvideo/catena-go-toolchain:latest
      options: --user root:root
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['go']

    env:
      CMAKE_BUILD_TYPE: ''
      CONNECTIONS: REST
      BUILD_TARGET: ${{ github.workspace }}/build/go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install file utility # go needs this for CodeQL
        run: sudo apt-get update && sudo apt-get install -y file

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          debug: true

      - name: Build OpenAPI and Go Dependencies
        run: |
          echo "Building OpenAPI"
          cd ${GITHUB_WORKSPACE}/smpte
          ./build-openapi.sh
          echo "Done building OpenAPI"
          mkdir -p ${BUILD_TARGET} 

          # Install Go Dependencies
          cd ${GITHUB_WORKSPACE}/sdks/go
          git config --global --add safe.directory /__w/Catena/Catena
          go install golang.org/x/tools/gopls@latest
          go install github.com/go-delve/delve/cmd/dlv@latest
          
          # Ensure protoc and plugins are available
          sudo apt-get update && sudo apt-get install -y protobuf-compiler || true
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          
          # Setup Go environment
          ${GITHUB_WORKSPACE}/.devcontainer/go/postCreateCommand.sh root ${BUILD_TARGET} ${GITHUB_WORKSPACE}
          cd ${GITHUB_WORKSPACE}/sdks/go
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      - name: Upload error and fatal logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            logs/*error*.log
            logs/*fatal*.log
          if-no-files-found: ignore
          retention-days: 1

  Go-Unit-Tests:
    name: Run Go Unit Tests and Coverage (5-10 minutes)
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/rossvideo/catena-go-toolchain:latest
      options: --user root:root
    
    env:
      CMAKE_BUILD_TYPE: ''
      CONNECTIONS: REST
      BUILD_TARGET: ${{ github.workspace }}/build/go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build OpenAPI and Go Dependencies
        run: |
          echo "Building OpenAPI"
          cd ${GITHUB_WORKSPACE}/smpte
          ./build-openapi.sh
          echo "Done building OpenAPI"
          mkdir -p ${BUILD_TARGET} 

          # Install Go Dependencies
          cd ${GITHUB_WORKSPACE}/sdks/go
          git config --global --add safe.directory /__w/Catena/Catena
          go install golang.org/x/tools/gopls@latest
          go install github.com/go-delve/delve/cmd/dlv@latest
          
          # Ensure protoc and plugins are available
          sudo apt-get update && sudo apt-get install -y protobuf-compiler || true
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/axw/gocov/gocov@latest
          go install github.com/matm/gocov-html/cmd/gocov-html@latest
          
          # Setup Go environment
          ${GITHUB_WORKSPACE}/.devcontainer/go/postCreateCommand.sh root ${BUILD_TARGET} ${GITHUB_WORKSPACE}
          cd ${GITHUB_WORKSPACE}/sdks/go
          make

      - name: Run unit tests with coverage
        run: |
          # Create non-root user for testing
          useradd -m -s /bin/bash testuser 2>/dev/null || true
          
          # Ensure workspace is owned by testuser
          chown -R testuser:testuser ${GITHUB_WORKSPACE}
          
          # Run tests as non-root to properly test permission errors
          # Using runuser to preserve environment including PATH
          runuser -u testuser -- bash -c "cd ${GITHUB_WORKSPACE}/sdks/go && go test ./pkg/... ./internal/... -v -coverpkg=./pkg/...,./internal -coverprofile=coverage.out -covermode=count"

      - name: Generate coverage report
        run: |
          cd ${GITHUB_WORKSPACE}/sdks/go
          go tool cover -func=coverage.out > coverage.txt
          go tool cover -html=coverage.out -o coverage.html
          
          # Use full path to gocov tools (installed to $GOPATH/bin)
          export PATH=$PATH:$(go env GOPATH)/bin
          gocov convert coverage.out | gocov-html > coverage-detailed.html

      - name: Display coverage summary
        run: |
          cd ${GITHUB_WORKSPACE}/sdks/go
          echo "### Go Test Coverage Summary"
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: |
            sdks/go/coverage.out
            sdks/go/coverage.txt
            sdks/go/coverage.html
            sdks/go/coverage-detailed.html
          retention-days: 30