name: "02 Security Scan"

"on":
  workflow_call:

jobs:
  verify_dependabot:
    name: Verify Dependabot Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require dependabot config
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/dependabot.yml

  trivy:
    name: Trivy vulnerability scanner
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          skip-dirs: .git,build,coverage,docs,unittests
          skip-files: pom.xml

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: Trivy Scan Results

  report_security:
    name: Report Security Results
    needs: [verify_dependabot, trivy]
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment on security failures
        if: ${{ needs.verify_dependabot.result != 'success' || needs.trivy.result != 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-comment:security -->';
            const lines = [
              marker,
              '## Security Scan Issues',
              '',
              '| Check | Result |',
              '| --- | --- |',
              `| Dependabot configuration | ${JSON.stringify('${{ needs.verify_dependabot.result }}')} |`,
              `| Trivy scan | ${JSON.stringify('${{ needs.trivy.result }}')} |`,
              '',
              'Review the failed security jobs in this workflow run for details.'
            ];
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
