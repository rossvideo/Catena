<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catena Device Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --text-muted: #52525b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }
        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }
        
        /* Counter Card */
        .counter-card {
            grid-column: 1 / -1;
            margin-bottom: 1rem;
        }
        .counter-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .counter-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
        }
        .counter-value.running { color: var(--success); }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-weight: 500;
        }
        .status-badge.running {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }
        .status-badge.stopped {
            background: var(--border);
            color: var(--text-muted);
        }
        .counter-buttons {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            flex: 1;
            padding: 0.625rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }
        .btn.start {
            background: var(--success);
            border-color: var(--success);
            color: #000;
        }
        .btn.stop {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }
        .btn.add { background: var(--warning); border-color: var(--warning); color: #000; }
        
        /* Param rows */
        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .param-row:last-child { border-bottom: none; }
        .param-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .param-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
        }
        .param-value.bool-true { color: var(--success); }
        .param-value.bool-false { color: var(--danger); }
        
        /* Footer */
        footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        footer code {
            color: var(--text-dim);
            background: var(--card);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Device Dashboard</h1>
            <p class="subtitle">One of Everything REST Example</p>
        </header>

        <!-- Counter -->
        <div class="card counter-card">
            <div class="card-title">Counter</div>
            <div class="counter-display">
                <div class="counter-value" id="counterValue">0</div>
                <span class="status-badge stopped" id="statusBadge">Stopped</span>
            </div>
            <div class="counter-buttons">
                <button class="btn start" onclick="cmd('start')">▶ Start</button>
                <button class="btn stop" onclick="cmd('stop')">⏹ Stop</button>
                <button class="btn add" onclick="cmd('add10')">+10</button>
                <button class="btn" onclick="cmd('reset')">Reset</button>
            </div>
        </div>

        <div class="grid">
            <!-- Video Parameters -->
            <div class="card">
                <div class="card-title">Video</div>
                <div class="param-row">
                    <span class="param-name">resolution</span>
                    <span class="param-value" id="p-video/resolution">-</span>
                </div>
                <div class="param-row">
                    <span class="param-name">brightness</span>
                    <span class="param-value" id="p-video/brightness">-</span>
                </div>
                <div class="param-row">
                    <span class="param-name">contrast</span>
                    <span class="param-value" id="p-video/contrast">-</span>
                </div>
                <div class="param-row">
                    <span class="param-name">saturation</span>
                    <span class="param-value" id="p-video/saturation">-</span>
                </div>
            </div>

            <!-- Audio Parameters -->
            <div class="card">
                <div class="card-title">Audio</div>
                <div class="param-row">
                    <span class="param-name">volume</span>
                    <span class="param-value" id="p-audio/volume">-</span>
                </div>
                <div class="param-row">
                    <span class="param-name">muted</span>
                    <span class="param-value" id="p-audio/muted">-</span>
                </div>
            </div>

            <!-- System Parameters -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-title">System</div>
                <div class="param-row">
                    <span class="param-name">device_name</span>
                    <span class="param-value" id="p-system/device_name">-</span>
                </div>
            </div>
        </div>

        <footer>
            Polls <code>GET /value/all</code> every 500ms &bull; Use Postman to change values
        </footer>
    </div>

    <script>
        async function cmd(name) {
            try {
                const res = await fetch(`/st2138-api/v1/0/command/${name}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                const sv = data.struct_value;
                if (sv) updateCounter(sv.counter, sv.running);
            } catch (e) {}
        }

        function updateCounter(value, running) {
            const el = document.getElementById('counterValue');
            const badge = document.getElementById('statusBadge');
            el.textContent = value ?? 0;
            if (running) {
                el.classList.add('running');
                badge.className = 'status-badge running';
                badge.textContent = 'Running';
            } else {
                el.classList.remove('running');
                badge.className = 'status-badge stopped';
                badge.textContent = 'Stopped';
            }
        }

        function updateParam(id, value) {
            const el = document.getElementById('p-' + id);
            if (!el) return;
            
            // Handle different value types
            let display = value;
            el.classList.remove('bool-true', 'bool-false');
            
            if (typeof value === 'boolean') {
                display = value ? 'true' : 'false';
                el.classList.add(value ? 'bool-true' : 'bool-false');
            } else if (typeof value === 'number') {
                display = value;
            }
            
            el.textContent = display;
        }

        async function poll() {
            try {
                const res = await fetch('/st2138-api/v1/0/value/all');
                const data = await res.json();
                const sv = data.struct_value;
                if (sv) {
                    // Update counter
                    updateCounter(sv.counter, sv.counter_running);
                    
                    // Update params
                    for (const [key, val] of Object.entries(sv)) {
                        if (key !== 'counter' && key !== 'counter_running') {
                            updateParam(key, val);
                        }
                    }
                }
            } catch (e) {}
        }

        // Poll every 500ms
        setInterval(poll, 500);
        poll();
    </script>
</body>
</html>
