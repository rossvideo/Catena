<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catena Device Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --text-muted: #52525b;
            --section-device: #8b5cf6;
            --section-params: #06b6d4;
            --section-commands: #f59e0b;
            --section-assets: #ec4899;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.025em;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        /* Sections 2x2 grid */
        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 800px) {
            .sections-grid { grid-template-columns: 1fr; }
        }

        /* Section styling */
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .section-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .section-icon.device { background: rgba(139, 92, 246, 0.15); color: var(--section-device); }
        .section-icon.params { background: rgba(6, 182, 212, 0.15); color: var(--section-params); }
        .section-icon.commands { background: rgba(245, 158, 11, 0.15); color: var(--section-commands); }
        .section-icon.assets { background: rgba(236, 72, 153, 0.15); color: var(--section-assets); }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text);
        }
        .section-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .section-content {
            flex: 1;
        }

        /* Card styling */
        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
        }
        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        /* Grid layouts */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .grid-full {
            grid-column: 1 / -1;
        }
        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* Counter Card */
        .counter-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .counter-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .counter-value.running { color: var(--success); }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-weight: 500;
        }
        .status-badge.running {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }
        .status-badge.stopped {
            background: var(--border);
            color: var(--text-muted);
        }
        .counter-buttons {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            flex: 1;
            padding: 0.625rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }
        .btn.start {
            background: var(--success);
            border-color: var(--success);
            color: #000;
        }
        .btn.stop {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }
        .btn.add { background: var(--warning); border-color: var(--warning); color: #000; }
        
        /* Param groups and rows */
        .param-group {
            margin-bottom: 1rem;
        }
        .param-group:last-child {
            margin-bottom: 0;
        }
        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.375rem 0;
            border-bottom: 1px solid var(--border);
        }
        .param-row:last-child { border-bottom: none; }
        .param-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .param-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
        }
        .param-value.bool-true { color: var(--success); }
        .param-value.bool-false { color: var(--danger); }

        /* Placeholder content */
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-muted);
            text-align: center;
            flex: 1;
        }
        .placeholder-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.4;
        }
        .placeholder-text {
            font-size: 0.8rem;
        }

        /* Slot list styling */
        .slot-list {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .slot-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .slot-btn:hover {
            border-color: var(--section-device);
            color: var(--text);
        }
        .slot-btn.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--section-device);
            color: var(--section-device);
        }
        .device-details {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            max-height: 280px;
            overflow-y: auto;
        }
        .json-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }
        .json-key { color: var(--section-device); }
        .json-string { color: var(--success); }
        .json-number { color: var(--warning); }
        .json-bool { color: var(--section-params); }
        .json-null { color: var(--text-muted); }
        .json-bracket { color: var(--text-dim); }
        .device-loading {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        /* Footer */
        footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        footer code {
            color: var(--text-dim);
            background: var(--card);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>One of Everything</h1>
            <p class="subtitle">GO SDK REST Example</p>
        </header>

        <div class="sections-grid">
            <!-- DEVICE SECTION -->
            <div class="section" id="section-device">
                <div class="section-header">
                    <div class="section-icon device">📱</div>
                    <div>
                        <div class="section-title">Device</div>
                    </div>
                </div>
                <div class="section-content">
                    <div class="card-title">Select Slot</div>
                    <div class="slot-list" id="slotList">
                        <button class="slot-btn active" data-slot="0" onclick="selectSlot(0)">Slot 0</button>
                        <button class="slot-btn" data-slot="1" onclick="selectSlot(1)">Slot 1</button>
                        <button class="slot-btn" data-slot="2" onclick="selectSlot(2)">Slot 2</button>
                    </div>
                    <div class="device-details" id="deviceDetails">
                        <div class="device-loading">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- PARAMETERS SECTION -->
            <div class="section" id="section-parameters">
                <div class="section-header">
                    <div class="section-icon params">⚙️</div>
                    <div>
                        <div class="section-title">Parameters</div>
                    </div>
                </div>
                <div class="section-content">
                    <div class="param-group">
                        <div class="card-title">Video</div>
                        <div class="param-row">
                            <span class="param-name">resolution</span>
                            <span class="param-value" id="p-resolution">-</span>
                        </div>
                        <div class="param-row">
                            <span class="param-name">brightness</span>
                            <span class="param-value" id="p-brightness">-</span>
                        </div>
                        <div class="param-row">
                            <span class="param-name">contrast</span>
                            <span class="param-value" id="p-contrast">-</span>
                        </div>
                        <div class="param-row">
                            <span class="param-name">saturation</span>
                            <span class="param-value" id="p-saturation">-</span>
                        </div>
                    </div>
                    <div class="param-group">
                        <div class="card-title">Audio</div>
                        <div class="param-row">
                            <span class="param-name">volume</span>
                            <span class="param-value" id="p-volume">-</span>
                        </div>
                        <div class="param-row">
                            <span class="param-name">muted</span>
                            <span class="param-value" id="p-muted">-</span>
                        </div>
                    </div>
                    <div class="param-group">
                        <div class="card-title">System</div>
                        <div class="param-row">
                            <span class="param-name">device_name</span>
                            <span class="param-value" id="p-device_name">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COMMANDS SECTION (Counter) -->
            <div class="section" id="section-commands">
                <div class="section-header">
                    <div class="section-icon commands">⚡</div>
                    <div>
                        <div class="section-title">Commands</div>
                    </div>
                </div>
                <div class="section-content">
                    <div class="card-title">Counter Demo</div>
                    <div class="counter-display">
                        <div class="counter-value" id="counterValue">0</div>
                        <span class="status-badge stopped" id="statusBadge">Stopped</span>
                    </div>
                    <div class="counter-buttons">
                        <button class="btn start" onclick="cmd('start')">▶ Start</button>
                        <button class="btn stop" onclick="cmd('stop')">⏹ Stop</button>
                        <button class="btn add" onclick="cmd('add10')">+10</button>
                        <button class="btn" onclick="cmd('reset')">Reset</button>
                    </div>
                </div>
            </div>

            <!-- ASSETS SECTION -->
            <div class="section" id="section-assets">
                <div class="section-header">
                    <div class="section-icon assets">📦</div>
                    <div>
                        <div class="section-title">Assets</div>
                    </div>
                </div>
                <div class="section-content">
                    <div class="placeholder">
                        <div class="placeholder-icon">📦</div>
                        <div class="placeholder-text">Asset browser will be displayed here</div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
           Catena REST API
        </footer>
    </div>

    <script>
        let currentSlot = 0;

        // Extract value from protobuf JSON format (e.g., {int32_value: 5} -> 5)
        function extractValue(protoVal) {
            if (!protoVal) return null;
            if ('int32_value' in protoVal) return protoVal.int32_value;
            if ('uint32_value' in protoVal) return protoVal.uint32_value;
            if ('float32_value' in protoVal) return protoVal.float32_value;
            if ('string_value' in protoVal) return protoVal.string_value;
            return null;
        }

        // =====================================================================
        // Device Section
        // =====================================================================
        async function selectSlot(slot) {
            currentSlot = slot;
            
            // Update active button
            document.querySelectorAll('.slot-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.slot) === slot);
            });
            
            // Show loading state
            const details = document.getElementById('deviceDetails');
            details.innerHTML = '<div class="device-loading">Loading...</div>';
            
            // Fetch device info
            await fetchDevice(slot);
        }

        async function fetchDevice(slot) {
            const details = document.getElementById('deviceDetails');
            try {
                const res = await fetch(`/st2138-api/v1/${slot}`);
                if (!res.ok) {
                    details.innerHTML = `<div class="device-loading">Error: ${res.status}</div>`;
                    return;
                }
                const data = await res.json();
                renderDevice(data);
            } catch (e) {
                console.error('fetchDevice error:', e);
                details.innerHTML = `<div class="device-loading">Error loading device</div>`;
            }
        }

        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, null, 4);
            }
            // Escape HTML
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Apply syntax highlighting
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-bool';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function renderDevice(device) {
            const details = document.getElementById('deviceDetails');
            const highlighted = syntaxHighlight(device);
            details.innerHTML = `<pre class="json-display">${highlighted}</pre>`;
        }

        // =====================================================================
        // Commands Section
        // =====================================================================
        async function cmd(name) {
            try {
                const res = await fetch(`/st2138-api/v1/0/command/${name}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                const fields = data.struct_value?.fields;
                if (fields) {
                    const counter = extractValue(fields.counter);
                    const running = extractValue(fields.running);
                    updateCounter(counter, running);
                }
            } catch (e) { console.error('cmd error:', e); }
        }

        function updateCounter(value, running) {
            const el = document.getElementById('counterValue');
            const badge = document.getElementById('statusBadge');
            el.textContent = value ?? 0;
            // running is int32: 0 = false, 1 = true
            if (running === 1) {
                el.classList.add('running');
                badge.className = 'status-badge running';
                badge.textContent = 'Running';
            } else {
                el.classList.remove('running');
                badge.className = 'status-badge stopped';
                badge.textContent = 'Stopped';
            }
        }

        // =====================================================================
        // Parameters Section
        // =====================================================================
        function updateParam(id, value) {
            const el = document.getElementById('p-' + id);
            if (!el) return;
            
            let display = value;
            el.classList.remove('bool-true', 'bool-false');
            
            // Handle muted as int32 boolean (0/1)
            if (id === 'muted') {
                display = value === 1 ? 'true' : 'false';
                el.classList.add(value === 1 ? 'bool-true' : 'bool-false');
            }
            
            el.textContent = display;
        }

        async function poll() {
            try {
                const res = await fetch('/st2138-api/v1/0/value/all');
                const data = await res.json();
                const fields = data.struct_value?.fields;
                if (fields) {
                    // Update counter
                    const counter = extractValue(fields.counter);
                    const running = extractValue(fields.counter_running);
                    updateCounter(counter, running);
                    
                    // Update params
                    for (const [key, protoVal] of Object.entries(fields)) {
                        if (key !== 'counter' && key !== 'counter_running') {
                            updateParam(key, extractValue(protoVal));
                        }
                    }
                }
            } catch (e) { console.error('poll error:', e); }
        }

        // =====================================================================
        // Initialization
        // =====================================================================
        // Poll every 500ms
        setInterval(poll, 500);
        poll();
        
        // Load initial device info
        fetchDevice(0);
    </script>
</body>
</html>
