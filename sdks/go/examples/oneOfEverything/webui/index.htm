<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catena Device Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>One of Everything</h1>
            <p class="subtitle">Catena GO SDK</p>
        </header>

        <div class="sections-grid">
            <!-- DEVICE SECTION -->
            <div class="section" id="section-device">
                <div class="section-header">
                    <div class="section-icon device">📱</div>
                    <div>
                        <div class="section-title">Device</div>
                    </div>
                </div>
                <div class="section-content">
                    <div class="card-title">Select Slot</div>
                    <div class="slot-list" id="slotList">
                        <button class="slot-btn active" data-slot="0" onclick="selectSlot(0)">Slot 0</button>
                        <button class="slot-btn" data-slot="1" onclick="selectSlot(1)">Slot 1</button>
                        <button class="slot-btn" data-slot="2" onclick="selectSlot(2)">Slot 2</button>
                        <button class="expand-btn" onclick="expandDevice()" title="Expand device JSON">⛶ Expand</button>
                    </div>
                    <div class="device-details" id="deviceDetails">
                        <div class="device-loading">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- MIDDLE COLUMN: Commands + Assets stacked -->
            <div class="middle-column">
                <!-- COMMANDS SECTION (Counter) -->
                <div class="section" id="section-commands">
                    <div class="section-header">
                        <div class="section-icon commands">⚡</div>
                        <div>
                            <div class="section-title">Commands</div>
                        </div>
                    </div>
                    <div class="section-content">
                        <div class="card-title">Counter Demo</div>
                        <div class="counter-display">
                            <div class="counter-value" id="counterValue">0</div>
                            <span class="status-badge stopped" id="statusBadge">Stopped</span>
                        </div>
                        <div class="counter-buttons">
                            <button class="btn start" onclick="cmd('start')">▶ Start</button>
                            <button class="btn stop" onclick="cmd('stop')">⏹ Stop</button>
                            <button class="btn add" onclick="cmd('add10')">+10</button>
                            <button class="btn" onclick="cmd('reset')">Reset</button>
                        </div>
                    </div>
                </div>

                <!-- ASSETS SECTION -->
                <div class="section" id="section-assets">
                    <div class="section-header">
                        <div class="section-icon assets">📦</div>
                        <div>
                            <div class="section-title">Assets</div>
                        </div>
                    </div>
                    <div class="section-content" id="assetsContainer">
                        <div class="asset-loading">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- PARAMETERS SECTION -->
            <div class="section" id="section-parameters">
                <div class="section-header">
                    <div class="section-icon params">⚙️</div>
                    <div>
                        <div class="section-title">Parameters</div>
                    </div>
                </div>
                <div class="section-content" id="paramsContainer">
                    <!-- Generated by JavaScript -->
                </div>
            </div>
        </div>

        <footer>
            Made by Nelson G Daniels <span style="font-size:1rem;vertical-align:middle;">•</span>
            <a href="https://github.com/rossvideo/Catena">Catena</a>
        </footer>
    </div>

    <script src="/script.js"></script>
</body>
</html>
