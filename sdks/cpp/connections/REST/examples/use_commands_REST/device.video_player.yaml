slot: 0
multi_set_enabled: true
detail_level: FULL
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:op
subscriptions: true
language_packs: {}
params:
  dashboard_UI:
    type: STRING
    minimal_set: true
    oid_aliases: ["0xFF0E"]
    read_only: true
    value: {string_value: eo://use_commands.grid}
  state:
    type: STRING
    read_only: true
    value: {string_value: stopped}
    constraint:
      type: STRING_CHOICE
      string_choice:
        choices: [stopped, playing, paused, rewinding, fast_forwarding]
        strict: true
  video_file:
    type: STRING
    value: {string_value: eo://video/1}
    constraint:
      type: STRING_CHOICE
      string_choice:
        choices: [eo://video/1, eo://video/2, eo://video/3]
        strict: true
  playback_speed:
    type: FLOAT32
    value: {float32_value: 0.0}
    constraint:
      type: FLOAT_RANGE
      float32_range:
        min_value: -2.0
        max_value: 2.0
        step: 0.25
    read_only: true
  product:
    type: STRUCT
    read_only: true
    value: 
      struct_value:
        fields:
          name: { string_value: "Video Player" }
          vendor: { string_value: "Ross Video" }
          version: { string_value: "1.0.0" }
          catena_sdk: { string_value: "https://github.com/rossvideo/Catena.git" }
          serial_number: { string_value: "SN-7K9M-2024-XR485-BLU" }
    params:
      name: 
        type: STRING  
      vendor:
        type: STRING
      version:
        type: STRING
      catena_sdk:
        type: STRING
      catena_sdk_version:
        type: STRING
      serial_number:
        type: STRING
commands:
  play:
    type: EMPTY
  pause:
    type: EMPTY
  stop:
    type: EMPTY
  rewind:
    type: EMPTY
  fast_forward:
    type: EMPTY
  load:
    type: STRING
  eject:
    type: EMPTY
