
slot: 0
multi_set_enabled: true
detail_level: FULL
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
language_packs:
  packs:
    es:
      name: Spanish
      words:
        greeting: Hola
        parting: Adiós
    en:
      name: English
      words:
        greeting: Hello
        parting: Goodbye
    fr:
      name: French
      words:
        greeting: Bonjour
        parting: Adieu
    de:
      name: German
      words:
        greeting: Hallo
        parting: Auf Wiedersehen

params:
  product:
    type: STRUCT
    read_only: true
    value: 
      struct_value:
        fields:
          name: { string_value: "One of Everything" }
          vendor: { string_value: "Ross Video" }
          version: { string_value: "1.0.0" }
          catena_sdk: { string_value: "https://github.com/rossvideo/Catena.git" }
          serial_number: { string_value: "SN-7K9M-2024-XR485-BLU" }
    params:
      name: 
        type: STRING
      vendor:
        type: STRING
      version:
        type: STRING
      catena_sdk:
        type: STRING
      catena_sdk_version:
        type: STRING
      serial_number:
        type: STRING

  number_example: 
    type: INT32
    value: { int32_value: 0 }
    name: { display_strings: { en: "Int Example" } }
    minimal_set: true
  
  counter: 
    type: INT32
    value: { int32_value: 0 }
    name: { display_strings: { en: "Counter" } }
    minimal_set: true
  
  # Imports the parameter from the file specified below.
  float_example:
    type: FLOAT32
    value: { float32_value: 0.0 }
    name: { display_strings: { en: "Float Example" } }
    access_scope: st2138:op
    widget: default
    precision: 1
  
  string_example:
    type: STRING
    value: { string_value: "Hello World" }
    name: { display_strings: { en: "String Example" } }
    access_scope: st2138:cfg

  number_array:
    type: INT32_ARRAY
    value: { int32_array_values: { ints: [1, 2, 3, 4] } }
    name: { display_strings: { en: "Int Array Example" } }
  
  # Imports the parameter from the file specified below.
  float_array:
    type: FLOAT32_ARRAY
    value: { float32_array_values: { floats: [1.1, 2.2, 3.3, 4.4] } }
    name: { display_strings: { en: "Float Array Example" } }
    precision: 3

  string_array:
    type: STRING_ARRAY
    value: { string_array_values: { strings: ["one", "two", "three", "four", "five"] } }
    name: { display_strings: { en: "String Array Example" } }

  # This is a struct reference imported from another file and used as a
  # template oid for struct_example and struct_array.
  ref_struct:
    import: { url: params/param.ref_struct.yaml }

  # Imports the parameter from the file specified below.
  struct_example:
    import: { url: params/param.struct_example.yaml }

  # Imports the parameter from the file specified below.
  struct_array:
    import: { url: params/param.struct_array.yaml }

  # This is a struct param containing examples of various constraints.
  constraint_examples:
    import: { url: constraints/param.constraint_examples.yaml }

  authz_monitor:
    type: STRING
    access_scope: st2138:mon
    name:
      display_strings:
        en: "Monitor Scope (st2138:mon)"
        fr: "Portée de Surveillance (st2138:mon)"
        es: "Alcance de Monitoreo (st2138:mon)"
        ja: "監視スコープ (st2138:mon)"
    value:
      string_value: "You have st2138:mon scope!"
  authz_operate:
    type: STRING
    access_scope: st2138:op
    name:
      display_strings:
        en: "Operate Scope (st2138:op)"
        fr: "Portée d'Opération (st2138:op)"
        es: "Alcance de Operación (st2138:op)"
        ja: "操作スコープ (st2138:op)"
    value:
      string_value: "You have st2138:op scope!"
  authz_configure:
    type: STRING
    access_scope: st2138:cfg
    name:
      display_strings:
        en: "Configure Scope (st2138:cfg)"
        fr: "Portée de Configuration (st2138:cfg)"
        es: "Alcance de Configuración (st2138:cfg)"
        ja: "設定スコープ (st2138:cfg)"
    value:
      string_value: "You have st2138:cfg scope!"
  authz_admin:
    type: STRING
    access_scope: st2138:adm
    name:
      display_strings:
        en: "Admin Scope (st2138:adm)"
        fr: "Portée Admin (st2138:adm)"
        es: "Alcance de Admin (st2138:adm)"
        ja: "管理スコープ (st2138:adm)"
    value:
      string_value: "You have st2138:adm scope!"

menu_groups:
  status:
    name: { display_strings: { en: "Status" } }
    menus:
      product:
        name: {display_strings: { en: "Product" } }
        param_oids:
          - /number_example
    order: 0
  config:
    name: { display_strings: { en: "Config" } }
    menus:
      catena:
        name: {display_strings: { en: "Catena" } }
        param_oids:
          - /float_example
          - /string_example
      authz_examples:
        name: { display_strings: {
          en: "Authorization Examples",
          fr: "Exemples d'Autorisation",
          es: "Ejemplos de Autorización",
          ja: "認可の例"}}
        param_oids:
          - /authz_monitor
          - /authz_operate
          - /authz_configure
          - /authz_admin
    order: 1

commands:
  fib_start:
    type: EMPTY
    response: false
  fib_stop:
    type: EMPTY
    response: false
  fib_set:
    type: INT32
    response: false
  randomize:
    type: EMPTY
    response: false
  tape_bot:
    type: EMPTY
    response: false
