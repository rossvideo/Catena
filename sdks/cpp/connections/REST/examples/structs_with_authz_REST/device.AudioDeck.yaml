slot: 1
multi_set_enabled: true
subscriptions: true
detail_level: FULL
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
language_packs: {}
params:
  # Updated Eq Logic
  dashboard_UI:
    type: STRING
    oid_aliases: ["0xFF0E"]
    read_only: true
    value: {string_value: "eo://AudioDeck.grid"}
  dashboard_icon:
    type: STRING
    oid_aliases: ["0xFF0C"]
    read_only: true
    value: {string_value: "eo://catena_logo_16x16.png"}  
  eq:
    type: STRUCT
    name: {display_strings: {en: EQ}}
    params:
      response:
        type: INT32
        name: {display_strings: {en: Response}}
        access_scope: st2138:mon
        constraint:
          type: INT_RANGE
          int32_range:
            min_value: 0
            max_value: 100
            step: 2
        widget: wheel
      frequency:
        type: FLOAT32
        name: {display_strings: {en: Frequency}}
        access_scope: st2138:op
        constraint:
          type: FLOAT_RANGE
          float32_range:
            min_value: 20
            display_min: 20
            max_value: 20000
            display_max: 20000
        widget: wheel
      gain:
        type: FLOAT32
        name: {display_strings: {en: Gain}}
        access_scope: st2138:cfg
        constraint:
          type: FLOAT_RANGE
          float32_range:
            min_value: 0
            max_value: 10.0
            step: 0.1
        widget: wheel
      q_factor:
        type: FLOAT32
        name: {display_strings: {en: Q Factor}}
        access_scope: st2138:adm
        constraint:
          type: FLOAT_RANGE
          float32_range:
            min_value: 0
            max_value: 10.0
            step: 0.1
        widget: wheel
  # End of new EQ Logic

  # Template struct containing an array (STRUCT containing STRUCT_ARRAY)
  audio_channel: 
    type: STRUCT
    name: {display_strings: {en: Audio Channel}}
    params: 
      fader: 
        type: FLOAT32
        name: {display_strings: {en: Fader}}
      # Array within a struct
      eq_list: 
        type: STRUCT_ARRAY
        name: {display_strings: {en: EQ List}}
        params:
          response: 
            type: INT32
            name: {display_strings: {en: Response}}
            access_scope: st2138:mon
          frequency: 
            type: FLOAT32
            name: {display_strings: {en: Frequency}}
            access_scope: st2138:op
          gain: 
            type: FLOAT32
            name: {display_strings: {en: Gain}}
            access_scope: st2138:cfg
          q_factor: 
            type: FLOAT32
            name: {display_strings: {en: Q Factor}}
            access_scope: st2138:adm
        value: 
          struct_array_values: 
            struct_values:
              - struct_value:
                  fields: 
                    response: {int32_value: 0}
                    frequency: {float32_value: 0}
                    gain: {float32_value: 0}
                    q_factor: {float32_value: 0}
              - struct_value: 
                  fields: 
                    response: {int32_value: 0}
                    frequency: {float32_value: 0}
                    gain: {float32_value: 0}
                    q_factor: {float32_value: 0}

  # Demonstrates array of structs that contain arrays (nested arrays)
  audio_deck: 
    type: STRUCT_ARRAY
    name: {display_strings: {en: Audio Deck}}
    template_oid: /audio_channel
    value: 
      struct_array_values: 
        struct_values:
          - struct_value: 
              fields:
                fader: {float32_value: 0.0}
                eq_list: 
                  struct_array_values: 
                    struct_values:
                      - struct_value: 
                          fields: 
                            response: {int32_value: 1}
                            frequency: {float32_value: 100}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
                      - struct_value: 
                          fields: 
                            response: {int32_value: 2}
                            frequency: {float32_value: 200}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
          - struct_value: 
              fields: 
                fader: {float32_value: 0.1}
                eq_list:
                  struct_array_values: 
                    struct_values:
                      - struct_value: 
                          fields: 
                            response: {int32_value: 3}
                            frequency: {float32_value: 300}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
                      - struct_value: 
                          fields: 
                            response: {int32_value: 4}
                            frequency: {float32_value: 400}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
          - struct_value: 
              fields: 
                fader: {float32_value: 0.2}
                eq_list:
                  struct_array_values: 
                    struct_values:
                      - struct_value: 
                          fields: 
                            response: {int32_value: 5}
                            frequency: {float32_value: 500}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
                      - struct_value: 
                          fields: 
                            response: {int32_value: 6}
                            frequency: {float32_value: 600}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
          - struct_value: 
              fields: 
                fader: {float32_value: 0.3}
                eq_list:
                  struct_array_values: 
                    struct_values:
                      - struct_value: 
                          fields: 
                            response: {int32_value: 7}
                            frequency: {float32_value: 700}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
                      - struct_value: 
                          fields: 
                            response: {int32_value: 8}
                            frequency: {float32_value: 800}
                            gain: {float32_value: 0}
                            q_factor: {float32_value: 0}
  # Updated with new EQ Logic
  eq_graph_0:
    type: STRING
    name: {display_strings: {en: EQ Graph 0}}
    widget: eq_graph
    constraint:
      type: STRING_STRING_CHOICE
      string_string_choice:
        choices:
          - name: {display_strings: {en: audio_deck.0.eq_list.0.frequency}}
            value: "1.f"
          - name: {display_strings: {en: audio_deck.0.eq_list.0.gain}}
            value: "1.g"
          - name: {display_strings: {en: audio_deck.0.eq_list.0.q_factor}}
            value: "1.q"
          - name: {display_strings: {en: audio_deck.0.eq_list.1.frequency}}
            value: "2.f"
          - name: {display_strings: {en: audio_deck.0.eq_list.1.gain}}
            value: "2.g"
          - name: {display_strings: {en: audio_deck.0.eq_list.1.q_factor}}
            value: "2.q"
    value: {string_value: ""}

  eq_graph_1:
    type: STRING
    name: {display_strings: {en: EQ Graph 1}}
    widget: eq_graph
    constraint:
      type: STRING_STRING_CHOICE
      string_string_choice:
        choices:
          - name: {display_strings: {en: audio_deck.1.eq_list.0.frequency}}
            value: "1.f"
          - name: {display_strings: {en: audio_deck.1.eq_list.0.gain}}
            value: "1.g"
          - name: {display_strings: {en: audio_deck.1.eq_list.0.q_factor}}
            value: "1.q"
          - name: {display_strings: {en: audio_deck.1.eq_list.1.frequency}}
            value: "2.f"
          - name: {display_strings: {en: audio_deck.1.eq_list.1.gain}}
            value: "2.g"
          - name: {display_strings: {en: audio_deck.1.eq_list.1.q_factor}}
            value: "2.q"
    value: {string_value: ""}

  eq_graph_2:
    type: STRING
    name: {display_strings: {en: EQ Graph 2}}
    widget: eq_graph
    constraint:
      type: STRING_STRING_CHOICE
      string_string_choice:
        choices:
          - name: {display_strings: {en: audio_deck.2.eq_list.0.frequency}}
            value: "1.f"
          - name: {display_strings: {en: audio_deck.2.eq_list.0.gain}}
            value: "1.g"
          - name: {display_strings: {en: audio_deck.2.eq_list.0.q_factor}}
            value: "1.q"
          - name: {display_strings: {en: audio_deck.2.eq_list.1.frequency}}
            value: "2.f"
          - name: {display_strings: {en: audio_deck.2.eq_list.1.gain}}
            value: "2.g"
          - name: {display_strings: {en: audio_deck.2.eq_list.1.q_factor}}
            value: "2.q"
    value: {string_value: ""}

  eq_graph_3:
    type: STRING
    name: {display_strings: {en: EQ Graph 3}}
    widget: eq_graph
    constraint:
      type: STRING_STRING_CHOICE
      string_string_choice:
        choices:
          - name: {display_strings: {en: audio_deck.3.eq_list.0.frequency}}
            value: "1.f"
          - name: {display_strings: {en: audio_deck.3.eq_list.0.gain}}
            value: "1.g"
          - name: {display_strings: {en: audio_deck.3.eq_list.0.q_factor}}
            value: "1.q"
          - name: {display_strings: {en: audio_deck.3.eq_list.1.frequency}}
            value: "2.f"
          - name: {display_strings: {en: audio_deck.3.eq_list.1.gain}}
            value: "2.g"
          - name: {display_strings: {en: audio_deck.3.eq_list.1.q_factor}}
            value: "2.q"
    value: {string_value: ""} 

  # Demonstrates basic variant of structs
  effect_settings:
    type: STRUCT_VARIANT
    name: {display_strings: {en: Effect Settings}}
    params:
      reverb:
        type: STRUCT
        name: {display_strings: {en: Reverb}}
        params:
          room_size:
            type: FLOAT32
            name: {display_strings: {en: Room Size}}
          damping:
            type: FLOAT32
            name: {display_strings: {en: Damping}}
      delay:
        type: STRUCT
        name: {display_strings: {en: Delay}}
        params:
          time:
            type: FLOAT32
            name: {display_strings: {en: Time}}
          feedback:
            type: FLOAT32
            name: {display_strings: {en: Feedback}}
    value:
      struct_variant_value:
        struct_variant_type: "reverb"
        value:
          struct_value:
            fields:
              room_size: {float32_value: 0.7}
              damping: {float32_value: 0.3}

  # Demonstrates array of variants
  effect_chain:
    type: STRUCT_VARIANT_ARRAY
    name: {display_strings: {en: Effect Chain}}
    template_oid: /effect_settings
    value:
      struct_variant_array_values:
        struct_variants:
          - struct_variant_value:
              struct_variant_type: "reverb"
              value:
                struct_value:
                  fields:
                    room_size: {float32_value: 0.8}
                    damping: {float32_value: 0.3}
          - struct_variant_value:
              struct_variant_type: "delay"
              value:
                struct_value:
                  fields:
                    time: {float32_value: 0.4}
                    feedback: {float32_value: 0.6}

  # Templates for structs that will be used by variants
  delay_effect:
    type: STRUCT
    name: {display_strings: {en: Delay Effect}}
    params:
      time:
        type: FLOAT32
        name: {display_strings: {en: Time}}
      feedback:
        type: FLOAT32
        name: {display_strings: {en: Feedback}}
  delay_effects:  
    type: STRUCT_ARRAY
    name: {display_strings: {en: Delay Effects}}
    template_oid: /delay_effect

  # Variant using structs defined above
  dynamic_effect:
    type: STRUCT_VARIANT
    name: {display_strings: {en: Dynamic Effect}}
    params:
      single:
        type: STRUCT
        name: {display_strings: {en: Single Effect}}
        template_oid: /delay_effect
      multi:
        type: STRUCT_ARRAY
        name: {display_strings: {en: Multi Effect}}
        template_oid: /delay_effects  
    value:
      struct_variant_value:
        struct_variant_type: "multi"
        value:
          struct_array_values:
            struct_values:
              - struct_value:
                  fields:
                    time: {float32_value: 0.3}
                    feedback: {float32_value: 0.5}
              - struct_value:
                  fields:
                    time: {float32_value: 0.6}
                    feedback: {float32_value: 0.4}

  # Product Info           
  product:
    type: STRUCT
    access_scope: st2138:mon
    read_only: true
    value: 
      struct_value:
        fields:
          name: { string_value: "Audio Deck" }
          vendor: { string_value: "Ross Video" }
          version: { string_value: "1.0.0" }
          catena_sdk: { string_value: "https://github.com/rossvideo/Catena.git" }
          serial_number: { string_value: "SN-7K9M-2024-XR485-BLU" }
    params:
      name: 
        type: STRING
      vendor:
        type: STRING
      version:
        type: STRING
      catena_sdk:
        type: STRING
      catena_sdk_version:
        type: STRING
      serial_number:
        type: STRING