slot: 0
multi_set_enabled: true
detail_level: FULL
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon

params:
  dashboard_UI:
    type: STRING
    oid_aliases: ["0xFF0E"]
    read_only: true
    value:
      string_value: eo://ibc_2025.grid

  dashboard_icon:
    type: STRING
    oid_aliases: ["0xFF0C"]
    read_only: true
    value:
      string_value: eo://catena_logo_16x16.png

  meters:
    import:
      file: ./params/param.meters.yaml

  

  # This is a struct reference imported from another file and used as a
  # template oid for struct_example and struct_array.
