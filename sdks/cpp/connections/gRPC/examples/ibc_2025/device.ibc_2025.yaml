      en: "Status", 
      fr: "Statut", 
      es: "Estado", 
      ja: "ステータス" } }
    menus:
      product:
        name: { display_strings: { 
          en: "Product", 
          fr: "Produit", 
          es: "Producto", 
          ja: "製品" } }
        param_oids: []
        command_oids: []
        
  config:
    name: 
      display_strings:
        en: "IBC 2025"
        fr: "IBC 2025"
        es: "IBC 2025"
        ja: "IBC 2025"

    menus:
      channels:
        name: { display_strings: { 
          en: "Channels View", 
          fr: "Vue des Canaux", 
          es: "Vista de Canales", 
          ja: "チャンネルビュー" } }
