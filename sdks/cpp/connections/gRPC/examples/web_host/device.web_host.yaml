slot: 0
multi_set_enabled: true
detail_level: FULL
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon

params:
  dashboard_UI:
    type: STRING
    oid_aliases: ["0xFF0E"]
    read_only: true
    value: { string_value: "eo://web_host.grid" }

  dashboard_icon:
    type: STRING
    oid_aliases: ["0xFF0C"]
    read_only: true
    value: { string_value: "eo://catena_logo_16x16.png" }

  product:
    type: STRUCT
    read_only: true
    value: 
      struct_value:
        fields:
          name: { string_value: "Web host" }
          vendor: { string_value: "Ross Video" }
          version: { string_value: "0.1.0" }
          catena_sdk: { string_value: "https://github.com/rossvideo/Catena.git" }
          serial_number: { string_value: "SN-7K9M-2024-XR485-BLU" }
    params:
      name: 
        type: STRING  
      vendor:
        type: STRING
      version:
        type: STRING
      catena_sdk:
        type: STRING
      catena_sdk_version:
        type: STRING
      serial_number:
        type: STRING

  counter: 
    type: INT32
    value: { int32_value: 0 }
    name: { display_strings: { 
      en: "Counter", 
      fr: "Compteur", 
      es: "Contador", 
      ja: "カウンター" } }
    minimal_set: true
  
  slider:
    type: FLOAT32
    value: { float32_value: 50.0 }
    constraint:
      type: FLOAT_RANGE
      float32_range:
        min_value: 0.0
        max_value: 100.0
        display_min: 10.0
        display_max: 90.0
        step: 0.1
    widget: slider_horizontal_no_label

commands:
  default:
    type: EMPTY