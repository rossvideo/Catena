<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Audio Deck - Catena gRPC</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="assets/catena_logo_16x16.png">
</head>
<body>
    <header>
        <h1>Visual Audio Deck</h1>
        <div class="status">
            <span id="status">Connecting...</span>
        </div>
    </header>
    
    <main>
        <!-- Main Section -->
        <section class="main-section">
            <h2>Main Controls</h2>
            <div class="main-controls">
                <div class="control-group">
                    <label>Main Output:</label>
                    <span id="main-output" class="value">0.000000</span>
                </div>
                <div class="control-group">
                    <label>Main Slider:</label>
                    <span id="main-slider" class="value">-20.0</span>
                </div>
                <div class="control-group">
                    <label>Select:</label>
                    <span id="main-select" class="boolean">false</span>
                </div>
                <div class="control-group">
                    <label>Solo:</label>
                    <span id="main-solo" class="boolean">false</span>
                </div>
                <div class="control-group">
                    <label>Mute:</label>
                    <span id="main-mute" class="boolean">false</span>
                </div>
            </div>
        </section>

        <!-- Channels Section -->
        <section class="channels-section">
            <h2>Audio Channels (4 channels)</h2>
            <div class="channels-grid" id="channels-grid">
                <!-- Channels will be populated by JavaScript -->
            </div>
        </section>

        <!-- Raw Data Section -->
        <section class="raw-data-section">
            <h2>Raw Parameter Data</h2>
            <button id="toggle-raw-data">Show Raw Data</button>
            <pre id="raw-data" style="display: none;"></pre>
        </section>
    </main>

<script>
let paramsData = null;

// Fetch and display all parameters
async function fetchParams() {
    try {
        const response = await fetch('/api/params');
        if (!response.ok) throw new Error('Failed to fetch parameters');
        
        paramsData = await response.json();
        updateDisplay();
        document.getElementById('status').textContent = 'Connected';
        document.getElementById('status').className = 'connected';
    } catch (error) {
        console.error('Error fetching parameters:', error);
        document.getElementById('status').textContent = 'Connection Error';
        document.getElementById('status').className = 'error';
    }
}

// Update the display with current parameter values
function updateDisplay() {
    if (!paramsData) return;

    // Update main controls
    if (paramsData.main.output !== undefined) {
        document.getElementById('main-output').textContent = paramsData.main.output.toFixed(6);
    }
    if (paramsData.main.slider !== undefined) {
        document.getElementById('main-slider').textContent = paramsData.main.slider.toFixed(1);
    }
    if (paramsData.main.select !== undefined) {
        document.getElementById('main-select').textContent = paramsData.main.select;
        document.getElementById('main-select').className = paramsData.main.select ? 'boolean true' : 'boolean false';
    }
    if (paramsData.main.solo !== undefined) {
        document.getElementById('main-solo').textContent = paramsData.main.solo;
        document.getElementById('main-solo').className = paramsData.main.solo ? 'boolean true' : 'boolean false';
    }
    if (paramsData.main.mute !== undefined) {
        document.getElementById('main-mute').textContent = paramsData.main.mute;
        document.getElementById('main-mute').className = paramsData.main.mute ? 'boolean true' : 'boolean false';
    }

    // Update channels
    updateChannelsDisplay();

    // Update raw data
    document.getElementById('raw-data').textContent = JSON.stringify(paramsData, null, 2);
}

// Update channels display
function updateChannelsDisplay() {
    const channelsGrid = document.getElementById('channels-grid');
    channelsGrid.innerHTML = '';

    if (paramsData.channels) {
        paramsData.channels.forEach((channel, index) => {
            const channelDiv = document.createElement('div');
            channelDiv.className = 'channel';
            channelDiv.innerHTML = `
                <h3>Channel ${channel.id}</h3>
                <div class="channel-data">
                    <div class="data-group">
                        <h4>Signal Data</h4>
                        <div class="param">
                            <label>Signal:</label>
                            <span class="signal-value">${channel.signal ? channel.signal.toFixed(6) : '0.000000'}</span>
                        </div>
                        <div class="param">
                            <label>Volume:</label>
                            <span>${channel.volume ? channel.volume.toFixed(3) : '0.000'}</span>
                        </div>
                        <div class="param">
                            <label>Base Freq (f0):</label>
                            <span>${channel.frequency ? channel.frequency.toFixed(2) : '0.00'} Hz</span>
                        </div>
                        <div class="param">
                            <label>Alpha:</label>
                            <span>${channel.alpha ? channel.alpha.toFixed(3) : '0.000'}</span>
                        </div>
                    </div>

                    <div class="data-group">
                        <h4>Controls</h4>
                        <div class="param">
                            <label>Select:</label>
                            <span class="${channel.select ? 'boolean true' : 'boolean false'}">${channel.select}</span>
                        </div>
                        <div class="param">
                            <label>Solo:</label>
                            <span class="${channel.solo ? 'boolean true' : 'boolean false'}">${channel.solo}</span>
                        </div>
                        <div class="param">
                            <label>Mute:</label>
                            <span class="${channel.mute ? 'boolean true' : 'boolean false'}">${channel.mute}</span>
                        </div>
                        <div class="param">
                            <label>Slider:</label>
                            <span>${channel.slider ? channel.slider.toFixed(1) : '0.0'} dB</span>
                        </div>
                    </div>
                </div>
            `;
            channelsGrid.appendChild(channelDiv);
        });
    }
}

// Toggle raw data display
document.getElementById('toggle-raw-data').addEventListener('click', function() {
    const rawData = document.getElementById('raw-data');
    const button = document.getElementById('toggle-raw-data');
    
    if (rawData.style.display === 'none') {
        rawData.style.display = 'block';
        button.textContent = 'Hide Raw Data';
    } else {
        rawData.style.display = 'none';
        button.textContent = 'Show Raw Data';
    }
});

// Auto-refresh parameters every 500ms for real-time updates
function startAutoRefresh() {
    setInterval(fetchParams, 500);
}

// Initialize
fetchParams();
startAutoRefresh();
</script>
</body>
</html>
