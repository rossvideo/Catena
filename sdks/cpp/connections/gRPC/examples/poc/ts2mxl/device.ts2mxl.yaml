slot: 0
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
params:
  product:
    type: STRUCT
    read_only: true
    params:
      name:
        type: STRING
      vendor:
        type: STRING
      version:
        type: STRING
      catena_sdk:
        type: STRING
      catena_sdk_version:
        type: STRING
      serial_number:
        type: STRING
    value:
      struct_value:
        fields:
          name:
            string_value: gRPC MXL Reader
          vendor:
            string_value: Ross Video
          version:
            string_value: "1.0.0"
          catena_sdk:
            string_value: Catena C++ SDK
          serial_number:
            string_value: SN0987654321

  inputs:
    type: STRUCT
    params:
      ts_file_path:
        name:
          display_strings:
            en: "TS File Path"
        type: STRING
      target_domain:
        name:
          display_strings:
            en: "Target Domain"
        type: STRING
      target_flow:
        name:
          display_strings:
            en: "Target Flow"
        type: STRING
    value:
      struct_value:
        fields:
          ts_file_path:
            string_value: "/dev/shm/main.ts"
          target_domain:
            string_value: "/dev/shm/mxl"
          target_flow: 
            string_value: "5fbec3b1-1b0f-417d-9059-8b94a47197ed"

commands:
  go_live:
    type: EMPTY
    name:
      display_strings:
        en: "Go Live"
    response: false
  stop:
    type: EMPTY
    name:
      display_strings:
        en: "Stop"
    response: false

menu_groups:
  config:
    name:
      display_strings:
        en: "Configuration"
    order: 1
    menus:
      inputs:
        name:
          display_strings:
            en: "Configuration"
        param_oids:
          - /inputs/ts_file_path
          - /inputs/target_domain
          - /inputs/target_flow
