slot: 0
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
params:
  dashboard_icon:
    type: STRING
    oid_aliases: ["0xFF0C"]
    read_only: true
    value: { string_value: "eo://mxl_ingest_stream.png" }

  product:
    type: STRUCT
    read_only: true
    params:
      name:
        type: STRING
        name:
          display_strings:
            en: Product Name
      vendor:
        type: STRING
        name:
          display_strings:
            en: Vendor
      version:
        type: STRING
        name:
          display_strings:
            en: Version
      catena_sdk:
        type: STRING
        name:
          display_strings:
            en: Catena SDK
      catena_sdk_version:
        type: STRING
        name:
          display_strings:
            en: Catena SDK Version
      serial_number:
        type: STRING
        name:
          display_strings:
            en: Serial Number
    value:
      struct_value:
        fields:
          name:
            string_value: TS to MXL Converter
          vendor:
            string_value: Ross Video
          version:
            string_value: "1.0.0"
          catena_sdk:
            string_value: Catena C++ SDK
          serial_number:
            string_value: SN123456789

  status:
    type: STRING
    read_only: true
    name:
      display_strings:
        en: "Status"
    value:
      string_value: "Stopped"

  inputs:
    type: STRUCT
    params:
      ts_file_path:
        name:
          display_strings:
            en: "TS File Path"
        type: STRING
      target_domain:
        name:
          display_strings:
            en: "Target Domain"
        type: STRING
      target_flow:
        name:
          display_strings:
            en: "Target Flow"
        type: STRING
    value:
      struct_value:
        fields:
          ts_file_path:
            string_value: "/dev/shm/main.ts"
          target_domain:
            string_value: "/dev/shm/mxl"

commands:
  start:
    type: EMPTY
    name:
      display_strings:
        en: "Start"
    response: false
  stop:
    type: EMPTY
    name:
      display_strings:
        en: "Stop"
    response: false

menu_groups:
  status:
    name:
      display_strings:
        en: "Status"
    order: 0
    menus:
      status:
        name:
          display_strings:
            en: "Status"
        param_oids:
          - /status
          - /product/name
          - /product/vendor
          - /product/version
          - /product/catena_sdk
          - /product/catena_sdk_version
          - /product/serial_number
  config:
    name:
      display_strings:
        en: "Configuration"
    order: 1
    menus:
      inputs:
        name:
          display_strings:
            en: "Configuration"
        param_oids:
          - /inputs/ts_file_path
          - /inputs/target_domain
          - /inputs/target_flow
      control:
        name:
          display_strings:
            en: Control
        client_hints:
          oglml: eo://demo.grid
