slot: 0
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
params:
  product:
    type: STRUCT
    read_only: true
    params:
      name:
        type: STRING
      vendor:
        type: STRING
      version:
        type: STRING
      catena_sdk:
        type: STRING
      catena_sdk_version:
        type: STRING
      serial_number:
        type: STRING
    value:
      struct_value:
        fields:
          name:
            string_value: gRPC MXL Reader
          vendor:
            string_value: Ross Video
          version:
            string_value: "1.0.0"
          catena_sdk:
            string_value: Catena C++ SDK
          serial_number:
            string_value: SN0987654321

  ref_flow_info:
    import:
      file: ../templates/param.mxl_flow_info.yaml

  flow_info:
    template_oid: /ref_flow_info
    type: STRUCT
    value:
      struct_value:
        fields:
          head_index:
            string_value: ""
          last_write_time:
            string_value: ""
          last_read_time:
            string_value: ""

  flow_def:
    import:
      file: ../templates/param.flow_def.yaml

menu_groups:
  status:
    name:
      display_strings:
        en: "Status"
    order: 0
    menus:
      flow_def:
        name:
          display_strings:
            en: "Flow Definition"
        param_oids:
          - /flow_def/id
          - /flow_def/description
          - /flow_def/tags
          - /flow_def/format
          - /flow_def/label
          - /flow_def/parents
          - /flow_def/media_type
          - /flow_def/grain_rate
          - /flow_def/frame_width
          - /flow_def/frame_height
          - /flow_def/interlace_mode
          - /flow_def/colorspace
          - /flow_def/components
