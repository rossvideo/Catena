slot: 0
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
params:
  dashboard_icon:
    type: STRING
    oid_aliases: ["0xFF0C"]
    read_only: true
    value: { string_value: "eo://mxl_egress_network.png" }

  product:
    type: STRUCT
    read_only: true
    params:
      name:
        type: STRING
        name:
          display_strings:
            en: Product Name
      vendor:
        type: STRING
        name:
          display_strings:
            en: Vendor
      version:
        type: STRING
        name:
          display_strings:
            en: Version
      catena_sdk:
        type: STRING
        name:
          display_strings:
            en: Catena SDK
      catena_sdk_version:
        type: STRING
        name:
          display_strings:
            en: Catena SDK Version
      serial_number:
        type: STRING
        name:
          display_strings:
            en: Serial Number
    value:
      struct_value:
        fields:
          name:
            string_value: MXL to NDI Sink
          vendor:
            string_value: Ross Video
          version:
            string_value: "1.0.0"
          catena_sdk:
            string_value: Catena C++ SDK
          serial_number:
            string_value: SN0987654321

  ref_flow_info:
    import:
      file: ../templates/param.mxl_flow_info.yaml

  flow_info:
    template_oid: /ref_flow_info
    type: STRUCT
    value:
      struct_value:
        fields:
          head_index:
            string_value: ""
          last_write_time:
            string_value: ""
          last_read_time:
            string_value: ""

  flow_def:
    import:
      file: ../templates/param.flow_def.yaml

  flow_ids:
    type: STRING
    name:
      display_strings:
        en: "Flow IDs from List Flows"
    value:
      string_value: ""

  status:
    type: STRING
    name:
      display_strings:
        en: "Status"
    constraint:
      type: STRING_STRING_CHOICE
      string_string_choice:
        choices:
          - name:
              display_strings:
                en: "Running"
            value: "Running"
          - name:
              display_strings:
                en: "Stopped"
            value: "Stopped"
    value:
      string_value: "Stopped"

  selected_index:
    type: INT32
    name:
      display_strings:
        en: "Selected Input"
    constraint:
      type: INT_RANGE
      int32_range:
        min_value: 0
        max_value: 3
    value:
      int32_value: 0

  selected_flow_id:
    type: STRING
    name:
      display_strings:
        en: "Selected Input Flow ID"
    value:
      string_value: ""

  selected_name:
    type: STRING
    name:
      display_strings:
        en: "Selected Input Name"
    value:
      string_value: ""

  inputs:
    type: STRUCT_ARRAY
    params:
      name:
        type: STRING
        name:
          display_strings:
            en: "Name"
      domain:
        type: STRING
        name:
          display_strings:
            en: "Domain"
      flow_id:
        type: STRING
        name:
          display_strings:
            en: "Flow ID"

    value:
      struct_array_values:
        struct_values:
          - struct_value:
              fields:
                name:
                  string_value: Video
                domain:
                  string_value: /dev/shm/mxl
                flow_id:
                  string_value: 5fbec3b1-1b0f-417d-9059-8b94a47197ed
          - struct_value:
              fields:
                name:
                  string_value: SMPTE Bars
                domain:
                  string_value: /dev/shm/mxl
                flow_id:
                  string_value: e1c42092-22fc-43fb-ae41-3b351664b6e5
          # - struct_value:
          #     fields:
          #       name:
          #         string_value: ""
          #       domain:
          #         string_value: /dev/shm/mxl
          #       flow_id:
          #         string_value: ""
          # - struct_value:
          #     fields:
          #       name:
          #         string_value: ""
          #       domain:
          #         string_value: /dev/shm/mxl
          #       flow_id:
          #         string_value: ""

commands:
  list_flows:
    type: EMPTY
    name:
      display_strings:
        en: "List Flows"
    response: false
  start:
    type: EMPTY
    name:
      display_strings:
        en: "Start"
    response: false
  stop:
    type: EMPTY
    name:
      display_strings:
        en: "Stop"
    response: false

menu_groups:
  status:
    name:
      display_strings:
        en: "Status"
    order: 0
    menus:
      status:
        name:
          display_strings:
            en: "Status"
        param_oids:
          - /status
          - /product/name
          - /product/vendor
          - /product/version
          - /product/catena_sdk
          - /product/catena_sdk_version
          - /product/serial_number
      flow_def:
        name:
          display_strings:
            en: "Flow Definition"
        param_oids:
          - /status
          - /selected_index
          - /selected_name
          - /flow_def/id
          - /flow_def/description
          - /flow_def/tags
          - /flow_def/format
          - /flow_def/label
          - /flow_def/parents
          - /flow_def/media_type
          - /flow_def/grain_rate
          - /flow_def/frame_width
          - /flow_def/frame_height
          - /flow_def/interlace_mode
          - /flow_def/colorspace
          - /flow_def/components
      flows:
        name:
          display_strings:
            en: "Flows"
        param_oids:
          - /flow_ids
  config:
    name:
      display_strings:
        en: "Configuration"
    order: 1
    menus:
      inputs:
        name:
          display_strings:
            en: Inputs
        param_oids:
          - /inputs
          - /selected_index
      demo:
        name:
          display_strings:
            en: "Demo Controls"
        client_hints:
          oglml: eo://demo.grid
