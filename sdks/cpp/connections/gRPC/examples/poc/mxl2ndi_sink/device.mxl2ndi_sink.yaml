slot: 0
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
params:
  dashboard_icon:
    type: STRING
    oid_aliases: ["0xFF0C"]
    read_only: true
    value: { string_value: "eo://mxl_egress_network.png" }

  product:
    type: STRUCT
    read_only: true
    params:
      name:
        type: STRING
        name:
          display_strings:
            en: Product Name
      vendor:
        type: STRING
        name:
          display_strings:
            en: Vendor
      version:
        type: STRING
        name:
          display_strings:
            en: Version
      catena_sdk:
        type: STRING
        name:
          display_strings:
            en: Catena SDK
      catena_sdk_version:
        type: STRING
        name:
          display_strings:
            en: Catena SDK Version
      serial_number:
        type: STRING
        name:
          display_strings:
            en: Serial Number
    value:
      struct_value:
        fields:
          name:
            string_value: MXL to NDI Sink
          vendor:
            string_value: Ross Video
          version:
            string_value: "1.0.0"
          catena_sdk:
            string_value: Catena C++ SDK
          serial_number:
            string_value: SN0987654321

  flow_def:
    import:
      url: ../templates/param.flow_def.yaml

  status:
    type: STRING
    name:
      display_strings:
        en: "Status"
    constraint:
      type: STRING_STRING_CHOICE
      string_string_choice:
        choices:
          - name:
              display_strings:
                en: "Running"
            value: "Running"
          - name:
              display_strings:
                en: "Stopped"
            value: "Stopped"
    value:
      string_value: "Stopped"

  selected_index:
    type: INT32
    name:
      display_strings:
        en: "Selected Input"
        ai: "The index of the currently selected input flow. This is used to control which input flow is live. Changing this will change which flow is live."
    value:
      int32_value: 0

  selected_flow_id:
    type: STRING
    name:
      display_strings:
        en: "Selected Input Flow ID"
    value:
      string_value: ""

  selected_name:
    type: STRING
    name:
      display_strings:
        en: "Selected Input Name"
    value:
      string_value: ""

  inputs:
    type: STRUCT_ARRAY
    params:
      name:
        type: STRING
        name:
          display_strings:
            en: "Name"
            ai: The name of the input flow
      domain:
        type: STRING
        name:
          display_strings:
            en: "Domain"
            ai: The MXL domain used for this flow
      flow_id:
        type: STRING
        name:
          display_strings:
            en: "Flow ID"
            ai: The MXL flow ID for this input flow. It is a GUID.
      live:
        type: INT32
        widget: checkbox
        name:
          display_strings:
            en: Live
            ai: Control the selected input flow. Only 1 flow will be selected as live at a time. 0 for not live, 1 for live.
        constraint:
          type: INT_CHOICE
          int32_choice:
            choices:
              - value: 0
                name:
                  display_strings:
                    en: "Off"
              - value: 1
                name:
                  display_strings:
                    en: "On"
      display:
        type: INT32
        widget: checkbox
        name:
          display_strings:
            en: Display
            ai: Independant from live, control which flow's metadata is displayed on the dashboard. 0 for not displayed, 1 for displayed. Changing live will change display, changing display will not change live. 0 for not displayed, 1 for displayed.
        constraint:
          type: INT_CHOICE
          int32_choice:
            choices:
              - value: 0
                name:
                  display_strings:
                    en: "Off"
              - value: 1
                name:
                  display_strings:
                    en: "On"

    value:
      struct_array_values:
        struct_values:
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1
          - fields:
              name:
                string_value: ""
              domain:
                string_value: ""
              flow_id:
                string_value: ""
              live:
                int32_value: 1
              display:
                int32_value: 1

  flow_def_template:
    import:
      url: ../templates/param.flow_def.yaml

  flow_defs:
    type: STRUCT_ARRAY
    name:
      display_strings:
        en: Flow Definitions
        ai: "All available flow definitions set up on the device."
    template_oid: /flow_def_template
    value:
      struct_array_values:
        struct_values: []

commands:
  start:
    type: EMPTY
    name:
      display_strings:
        en: "Start"
    response: false
  stop:
    type: EMPTY
    name:
      display_strings:
        en: "Stop"
    response: false

menu_groups:
  status:
    name:
      display_strings:
        en: "Status"
    order: 0
    menus:
      status:
        name:
          display_strings:
            en: "Status"
        param_oids:
          - /status
          - /product/name
          - /product/vendor
          - /product/version
          - /product/catena_sdk
          - /product/catena_sdk_version
          - /product/serial_number
      flow_def:
        name:
          display_strings:
            en: "Flow Definition"
        param_oids:
          - /status
          - /selected_index
          - /selected_name
          - /flow_def/id
          - /flow_def/description
          - /flow_def/tags
          - /flow_def/format
          - /flow_def/label
          - /flow_def/parents
          - /flow_def/media_type
          - /flow_def/grain_rate
          - /flow_def/frame_width
          - /flow_def/frame_height
          - /flow_def/interlace_mode
          - /flow_def/colorspace
          - /flow_def/components
  config:
    name:
      display_strings:
        en: "Configuration"
    order: 1
    menus:
      demo:
        name:
          display_strings:
            en: Demo
        client_hints:
          oglml: eo://demo.grid
