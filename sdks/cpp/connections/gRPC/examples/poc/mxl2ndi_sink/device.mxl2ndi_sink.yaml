slot: 0
access_scopes: ["st2138:mon", "st2138:op", "st2138:cfg", "st2138:adm"]
default_scope: st2138:mon
params:
  product:
    type: STRUCT
    read_only: true
    params:
      name:
        type: STRING
      vendor:
        type: STRING
      version:
        type: STRING
      catena_sdk:
        type: STRING
      catena_sdk_version:
        type: STRING
      serial_number:
        type: STRING
    value:
      struct_value:
        fields:
          name:
            string_value: gRPC MXL Reader
          vendor:
            string_value: Ross Video
          version:
            string_value: "1.0.0"
          catena_sdk:
            string_value: Catena C++ SDK
          serial_number:
            string_value: SN0987654321

  ref_flow_info:
    import:
      file: ../templates/param.mxl_flow_info.yaml

  flow_info:
    template_oid: /ref_flow_info
    type: STRUCT
    value:
      struct_value:
        fields:
          head_index:
            string_value: ""
          last_write_time:
            string_value: ""
          last_read_time:
            string_value: ""

  flow_def:
    import:
      file: ../templates/param.flow_def.yaml

  flow_ids:
    type: STRING
    name:
      display_strings:
        en: "Flow IDs from List Flows"
    value:
      string_value: ""

  status:
    type: STRING
    name:
      display_strings:
        en: "Status"
    constraint:
      type: STRING_STRING_CHOICE
      string_string_choice:
        choices:
          - name:
              display_strings:
                en: "Running"
            value: "Running"
          - name:
              display_strings:
                en: "Stopped"
            value: "Stopped"
    value:
      string_value: "Stopped"

  inputs:
    type: STRUCT
    params:
      domains:
        name:
          display_strings:
            en: "Domains"
        type: STRING
      current_domain:
        name:
          display_strings:
            en: "Current Domain"
        type: STRING
      current_flow_id:
        name:
          display_strings:
            en: "Current Flow ID"
        type: STRING
    value:
      struct_value:
        fields:
          domains:
            string_value: ""
          current_domain:
            string_value: ""
          current_flow_id:
            string_value: ""

commands:
  list_flows:
    type: EMPTY
    name:
      display_strings:
        en: "List Flows"
    response: false
  start:
    type: EMPTY
    name:
      display_strings:
        en: "Start"
    response: false
  stop:
    type: EMPTY
    name:
      display_strings:
        en: "Stop"
    response: false

menu_groups:
  status:
    name:
      display_strings:
        en: "Status"
    order: 0
    menus:
      flow_def:
        name:
          display_strings:
            en: "Flow Definition"
        param_oids:
          - /status
          - /flow_def/id
          - /flow_def/description
          - /flow_def/tags
          - /flow_def/format
          - /flow_def/label
          - /flow_def/parents
          - /flow_def/media_type
          - /flow_def/grain_rate
          - /flow_def/frame_width
          - /flow_def/frame_height
          - /flow_def/interlace_mode
          - /flow_def/colorspace
          - /flow_def/components
      flows:
        name:
          display_strings:
            en: "Flows"
        param_oids:
          - /flow_ids
  config:
    name:
      display_strings:
        en: "Configuration"
    order: 1
    menus:
      inputs:
        name:
          display_strings:
            en: "Inputs"
        param_oids:
          - /inputs/domains
          - /inputs/current_domain
          - /inputs/current_flow_id
        command_oids:
          - /list_flows
          - /start
          - /stop
      commands:
        name:
          display_strings:
            en: "Commands"
        command_oids:
          - /list_flows
          - /start
          - /stop
        client_hints:
          oglml: "eo://commands.grid"
