    type: STRING
    read_only: true
    value: { string_value: "off" }
    constraint:
      type: STRING_CHOICE
      string_choice:
        choices: ["on", "off"]
        strict: true
  
  state:
      type: STRING
      read_only: true
      value: { string_value: "file loaded" }
      constraint:
        type: STRING_CHOICE
        string_choice:
          choices: ["locating tape", "tape found, loading...", "tape loaded, seeking...", "file found, reading...", "file loaded"]
          strict: true

