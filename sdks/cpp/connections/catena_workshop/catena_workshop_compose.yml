#
# Compose the docker image for the performance test.
#

version: '3.8'  # Docker Compose file format version

networks:
  catena_network: # Public network for client to communicate with gateway.
    name: catena_network
    driver: bridge

# Setting up the envoyproxy container.
services:
  performance_test:
    image: catena_performance_test
    container_name: catena_performance_test
    networks:
      - catena_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports: # Mapping ports from host to container.
      - 6256:6256 # gRPC
      - 443:443   # REST
    command:
      - "--authz"
    deploy:
      resources:
        limits: # Limiting the resources for the container to 1 core and 512MB.
          cpus: '2.0'
          memory: 512M